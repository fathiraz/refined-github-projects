name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Build & ZIP Chrome
        run: pnpm zip:chrome

      - name: Build & ZIP Firefox
        run: pnpm zip:firefox

      - name: Build & ZIP Edge
        run: pnpm zip:edge

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: dist/refined-github-projects-*.zip
          if-no-files-found: error

      - name: Upload store submission artifacts
        uses: actions/upload-artifact@v4
        with:
          name: store-zips
          path: |
            dist/*-chrome.zip
            dist/*-firefox.zip
            dist/*-sources.zip
          if-no-files-found: error

  upload-release-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-zips
          path: release-zips

      - name: Upload ZIPs to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-zips/*.zip

  submit-chrome:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download store submission artifacts
        uses: actions/download-artifact@v8
        with:
          name: store-zips
          path: dist

      - name: Submit to Chrome Web Store
        run: |
          pnpm wxt submit \
            --chrome-zip dist/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

  submit-firefox:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download store submission artifacts
        uses: actions/download-artifact@v8
        with:
          name: store-zips
          path: dist

      - name: Submit to Firefox Add-ons
        run: |
          pnpm wxt submit \
            --firefox-zip dist/*-firefox.zip \
            --firefox-sources-zip dist/*-sources.zip
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
